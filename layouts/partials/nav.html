<header class="site-header">
  <div class="brand">
    <a href="/">
      <img src="/logo.svg" alt="" class="brand-logo">
      <span class="brand-name">British Columbia Chess Federation</span>
    </a>
  </div>

  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
  <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle menu">
    <span class="nav-toggle-bar"></span>
  </label>

  <nav class="site-nav" aria-label="Main navigation">
    <ul class="nav-main">
      {{ range site.Menus.main }}
      <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
    <ul class="nav-org">
      {{ range site.Menus.org }}
      <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "org" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
</header>
