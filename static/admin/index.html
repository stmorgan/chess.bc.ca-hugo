<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>BCCF Content Manager</title>
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.8.4/dist/decap-cms.js"></script>
  <script>
    // News items default to expiring two weeks after their posted date.
    // Decap can't express "posted + 14 days" as a field default, so fill
    // a blank Expires field at save time instead.
    CMS.registerEventListener({
      name: 'preSave',
      handler: function ({ entry }) {
        if (entry.get('collection') !== 'news') return;
        var data = entry.get('data');
        if (data.get('expiry_date')) return;
        var posted = data.get('date') ? new Date(data.get('date')) : new Date();
        var expiry = new Date(posted.getTime() + 14 * 24 * 60 * 60 * 1000);
        return data.set('expiry_date', expiry.toISOString().slice(0, 10));
      },
    });
  </script>
</body>
</html>
