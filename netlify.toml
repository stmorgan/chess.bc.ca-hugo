[build]
command = "hugo --gc --minify"
publish = "public"

[build.environment]
HUGO_VERSION = "0.163.3"

[context.deploy-preview]
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

# Send the netlify.app address to the canonical domain
[[redirects]]
from = "https://chess-bc-ca.netlify.app/*"
to = "https://chess.bc.ca/:splat"
status = 301
force = true

# ---- Redirects from the old PHP site (protect bookmarks, inbound links, SEO) ----

# The constitution PDF was mixed-case on the old site
[[redirects]]
from = "/BCCFconstitution.pdf"
to = "/bccfconstitution.pdf"
status = 301

# Old bulletin deep links used a capital-B directory
[[redirects]]
from = "/Bulletins/*"
to = "/bulletins/:splat"
status = 301

