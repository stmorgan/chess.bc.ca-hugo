baseURL = "https://chess.bc.ca/"
locale = "en-CA"
# Front-matter dates (news expiry!) are interpreted in this zone; without it
# they parse as UTC and news would drop off the home page at 4/5 pm Pacific
# the previous day.
timeZone = "America/Vancouver"
title = "British Columbia Chess Federation"

disableKinds = ["taxonomy", "term"]

[params]
description = "Home of the British Columbia Chess Federation — clubs, tournaments, bulletins, and chess news from around BC."

# Editors write via Decap's rich-text widget; allow inline HTML in markdown
# instead of goldmark silently dropping it.
[markup.goldmark.renderer]
unsafe = true

# No source code on this site — keep crosstable text blocks unstyled
# so the site's own <pre> styling applies.
[markup.highlight]
codeFences = false

